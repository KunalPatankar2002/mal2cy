name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn test

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check deploy configuration
        id: deploy_check
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PI_APP_PATH: ${{ secrets.PI_APP_PATH }}
        run: |
          if [[ -n "$GHCR_USERNAME" && -n "$GHCR_TOKEN" && -n "$PI_APP_PATH" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are incomplete. Skipping deploy job steps."
          fi

      - name: Compute image name
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"

      - name: Prepare deploy directory
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        env:
          PI_APP_PATH: ${{ secrets.PI_APP_PATH }}
        run: |
          mkdir -p "$PI_APP_PATH/data" "$PI_APP_PATH/logs"
          cp docker-compose.deploy.yml "$PI_APP_PATH/docker-compose.deploy.yml"

      - name: Deploy latest image on self-hosted runner
        if: steps.deploy_check.outputs.ready == 'true'
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PI_APP_PATH: ${{ secrets.PI_APP_PATH }}
        run: |
          cd "$PI_APP_PATH"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          export MAL2CY_IMAGE="$IMAGE_NAME"
          docker compose -f docker-compose.deploy.yml pull
          docker compose -f docker-compose.deploy.yml up -d
